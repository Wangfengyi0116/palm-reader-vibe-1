<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手掌与掌纹识别 Demo</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>手掌与掌纹识别 Demo</h1>

        <div class="controls">
            <button id="startCameraButton">拍照</button>
            <button id="captureButton" style="display: none;">截图</button>
            <input type="file" id="uploadImageInput" accept="image/jpeg, image/png">
            <label for="uploadImageInput" class="button">导入照片</label>
            <button id="recognizeButton" disabled>识别</button>
            <button id="resetButton">重置</button>
        </div>

        <div class="video-container">
            <video id="webcamVideo" autoplay playsinline style="display: none;"></video>
            <canvas id="outputCanvas"></canvas>
        </div>

        <div class="results-panel">
            <h2>结果</h2>
            <p><strong>识别耗时:</strong> <span id="processingTime">N/A</span></p>
            <div id="lineConfidences">
                <p><strong>感情线 (Heart Line) 置信度:</strong> <span id="heartLineConf">N/A</span></p>
                <p><strong>智慧线 (Head Line) 置信度:</strong> <span id="headLineConf">N/A</span></p>
                <p><strong>生命线 (Life Line) 置信度:</strong> <span id="lifeLineConf">N/A</span></p>
            </div>
            <p><strong>识别状态:</strong> <span id="recognitionStatus">等待输入...</span></p>
            <p><strong>失败原因:</strong> <span id="failureReason" class="error-message">无</span></p>
            <div id="suggestions" class="suggestion-message"></div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
